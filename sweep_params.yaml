method: grid
metric:
  name: test/best_test_acc
  goal: maximize

parameters:
  dataset:
    parameters:
      dataset_name:
        value: "Ohsumed"
      doc_doc_k:
        value: 20
      word_word_k:
        value: 20

  model:
    parameters:
      model_name:
        value: "GAT"
      hidden_channels:
        value: 64

  optimizer:
    parameters:
      lr:
        value: 0.006474
      weight_decay:
        value: 0.04407


  trainer_pipeline:
    parameters:
      max_epochs:
        value: 200
      patience:
        value: 60

  seed_no:
    value: 56

  word_to_word_graph:
    value: False

  n_train_percentage:
    values: [0.01,0.05,0.1,0.2,0.5,0.70,1]

  