method: random
metric:
  name: test/test_accuracy
  goal: maximize

parameters:
  dataset:
    parameters:
      dataset_name:
        value: "R52"
      doc_doc_k:
        values: [10,20,30]
      word_word_k:
        values: [10,20,30]

  model:
    parameters:
      model_name:
        values: ["GNN","GAT"]
      hidden_channels:
        values: [32,64,128]

  optimizer:
    parameters:
      lr:
        min: 0.0001
        max: 0.0100
      weight_decay:
        min: 0.0010
        max: 0.1000 

  trainer_pipeline:
    parameters:
      max_epochs:
        value: 50
      patience:
        value: 20

  seed_no:
    min: 1
    max: 200

  word_to_word_graph:
    values: [False,True]

  